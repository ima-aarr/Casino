<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Casino Enterprise</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <header class="header-info">
        <span>💰 $<span id="moneyDisplay">1000</span></span>
        <span style="font-size: 18px; color: #b0bec5;">
            <span id="rankDisplay">🥉ブロンズ</span> (Lv.<span id="levelDisplay">1</span>)
        </span>
    </header>
    
    <main id="appContent">
        <div id="menuScreen" class="screen active">
            <div class="menu-grid">
                <button id="btnNavBlackjack" class="menu-btn">ブラックジャック</button>
                <button id="btnNavRoulette" class="menu-btn">ルーレット (3D)</button>
                <button id="btnNavSlot" class="menu-btn">スロットマシン (3D)</button>
                <button id="btnNavHighLow" class="menu-btn">ハイ＆ロー (3D)</button>
                <button id="btnNavDice" class="menu-btn">🎲 ダイス</button>
            </div>
            <div class="save-section">
                <button id="btnGenerateSave">セーブデータ作成</button>
                <textarea id="saveDataInput" placeholder="ここにセーブデータが表示・入力されます"></textarea>
                <button id="btnLoadSave">セーブデータ読込</button>
            </div>
        </div>

        <div id="blackjackScreen" class="screen">
            <button class="btn-back">◀ メニューに戻る</button>
            <div class="game-container">
                <div id="bjBetControls" class="controls">
                    <input type="number" id="bjBetAmount" value="100" min="1">
                    <button id="btnBjStart">開始</button>
                </div>
                <div id="bjGameArea" class="hidden">
                    <div class="card-area-wrapper">
                        <div id="dealerCards" class="card-area"></div>
                        <div id="dealerScore" class="score-display">0</div>
                    </div>
                    <div class="card-area-wrapper">
                        <div id="playerCards" class="card-area"></div>
                        <div id="playerScore" class="score-display">0</div>
                    </div>
                    <div id="bjResult" class="result-msg"></div>
                    <div id="bjActionControls" class="controls hidden">
                        <button id="btnBjHit">ヒット</button>
                        <button id="btnBjStand">スタンド</button>
                    </div>
                    <button id="btnBjNext" class="hidden">次へ</button>
                </div>
            </div>
        </div>

        <div id="rouletteScreen" class="screen">
            <button class="btn-back">◀ メニューに戻る</button>
            <div class="game-container">
                <div class="roulette-wrapper">
                    <div class="roulette-arrow"></div>
                    <canvas id="rouletteCanvas" width="320" height="320"></canvas>
                </div>
                <div class="controls">
                    <input type="number" id="rlBetAmount" value="100" min="1">
                    <select id="rlBetType">
                        <option value="red">赤</option>
                        <option value="black">黒</option>
                        <option value="even">偶数</option>
                        <option value="odd">奇数</option>
                        <option value="number">1点賭け</option>
                    </select>
                    <input type="number" id="rlTargetNumber" value="0" min="0" max="36" class="hidden">
                    <button id="btnRlSpin">スピン</button>
                </div>
                <div id="rlResult" class="result-msg"></div>
            </div>
        </div>

        <div id="slotScreen" class="screen">
            <button class="btn-back">◀ メニューに戻る</button>
            <div class="game-container">
                <div class="slot-machine-3d">
                    <div class="reel-container"><div class="reel" id="reel0"></div></div>
                    <div class="reel-container"><div class="reel" id="reel1"></div></div>
                    <div class="reel-container"><div class="reel" id="reel2"></div></div>
                </div>
                <div class="controls">
                    <input type="number" id="slotBetAmount" value="50" min="1">
                    <button id="btnSlotSpin">スピン</button>
                </div>
                <div id="slotResult" class="result-msg"></div>
            </div>
        </div>

        <div id="highlowScreen" class="screen">
            <button class="btn-back">◀ メニューに戻る</button>
            <div class="game-container">
                <div id="hlBetControls" class="controls">
                    <input type="number" id="hlBetAmount" value="100" min="1">
                    <button id="btnHlStart">開始</button>
                </div>
                <div id="hlGameArea" class="hidden">
                    <div class="hl-board">
                        <div class="card-3d-container" id="hlCurrentCard"></div>
                        <div class="card-3d-container" id="hlNextCard"></div>
                    </div>
                    <div id="hlResult" class="result-msg"></div>
                    <div id="hlActionControls" class="controls hidden">
                        <button id="btnHlHigh">ハイ</button>
                        <button id="btnHlLow">ロー</button>
                    </div>
                    <button id="btnHlNext" class="hidden">次へ</button>
                </div>
            </div>
        </div>

        <div id="diceScreen" class="screen">
            <button class="btn-back">◀ メニューに戻る</button>
            <div class="game-container">
                <h2>🎲 ダイスロール</h2>
                <p>2つのサイコロの合計を予想しよう！</p>
                
                <div class="card-area-wrapper">
                    <div id="diceDisplay" style="font-size: 80px; letter-spacing: 20px; margin: 20px 0;">❓ ❓</div>
                </div>

                <div class="controls">
                    <label>ベット額: $<input type="number" id="diceBetAmount" value="10" min="1"></label>
                    <br>
                    <label style="display: block; margin-top: 10px;">予想: 
                        <select id="diceBetType">
                            <option value="low">Low (2〜6) [配当: x2]</option>
                            <option value="high">High (8〜12) [配当: x2]</option>
                            <option value="seven">Lucky 7 [配当: x5]</option>
                        </select>
                    </label>
                    <br>
                    <button id="btnDiceRoll" style="margin-top: 15px;">サイコロを振る！</button>
                </div>
                <div id="diceResult" class="result-msg"></div>
            </div>
        </div>

    </main>
</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
